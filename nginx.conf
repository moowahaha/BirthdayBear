server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-style fallback isn't needed (single page), but ensure clean serving.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for static assets — they're versioned by path / filename.
    location ~* \.(png|jpg|jpeg|gif|svg|mp3|ogg|wav|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Force HTML to revalidate so updates ship immediately on next visit.
    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache";
    }
}
